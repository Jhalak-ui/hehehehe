<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #ffe6f2;
      margin: 0;
      padding: 50px;
    }

    .slide {
      display: none;
      font-size: 32px;
      margin-top: 100px;
    }

    .active {
      display: block;
    }

    button {
      padding: 15px 30px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 40px;
    }
  </style>
</head>
<body>

<div class="slide active">
  <h1>Hi ❤️</h1>
</div>

<div class="slide">
  <h1>I made this just for you 😊</h1>
</div>

<div class="slide">
  <h1>You make my days better ☀️</h1>
</div>

<div class="slide">
  <h1>You make me smile 😄</h1>
</div>

<div class="slide">
  <h1>So I have one question...</h1>
</div>

<div class="slide">
  <h1>Will You Be My Girlfriend? ❤️</h1>
</div>

<button onclick="nextSlide()">Next ➡️</button>

<script>
let current = 0;
const slides = document.querySelectorAll(".slide");

function nextSlide() {
  slides[current].classList.remove("active");
  current = (current + 1) % slides.length;
  slides[current].classList.add("active");
}
</script>

</body>
</html>
